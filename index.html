<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Login</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" type="image/png" href="img/iconlogin.png" />
  </head>
  <body>
    <div class="card">
      <div class="content">
        <img src="img/logo.svg" class="logo" />
        <h2>Login</h2>
        <h3>Silahkan Masukkan Email dan Password Anda</h3>
        <form>
          <input type="email" placeholder="Email" value="" />
          <div class="input-password">
            <input type="password" placeholder="Password" id="password" />
            <button type="button" class="toggle-password" onclick="togglePassword()">
              <img id="eye-open" src="img/close-eye.svg" width="20" height="20" />
              <img id="eye-off" src="img/eye.svg" width="20" height="20" style="display: none" />
            </button>
          </div>
          <div class="row">
            <label class="checkbox">
              <input type="checkbox" checked />
              <span class="check"></span>
              Ingat Saya
            </label>
            <a>Lupa Kata Sandi?</a>
          </div>
          <button type="submit">Login</button>
        </form>
        <p>Tidak Mempunyai Akun ? <a>Register</a></p>
      </div>
      <div class="hero">
        <img src="img/logo-white.svg" class="logo-white" />
        <video class="graphic" autoplay loop muted playsinline>
          <source src="img/bgside.mp4" type="video/mp4" />
        </video>
      </div>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
